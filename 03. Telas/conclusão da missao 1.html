<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Conclusão da Missão 1</title>
   <style>
    body { background: #1E4D8C; color: #333; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 8px; min-height: 100vh; overflow: hidden; }

.container { max-width: 1000px; margin: auto; }

.topo { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: white; padding: 8px 20px; border-radius: 20px; }

.logos img { height: 60px; width: auto; }

.card { background: #ffffff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 25px; }
    h1 { color: #1E4D8C; margin-top: 0; }
    .checks { list-style: none; padding: 0; }
    .checks li { margin-bottom: 5 px; font-weight: 500; font-size: 1.1rem; }
    .checks li::before { content: "✔ "; color: #28a745; font-weight: bold; }
    .botao-missao2 { display: block; background: #28a745; color: white; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; text-decoration: none; margin-top: 5 px; }
    .botao-missao2:hover { background: #218838; }
    .imagem-mochila { max-width: 300px; flex-shrink: 0; }
</style>
</head>
<body>

    <div style="text-align: center; margin-top: 15px; margin-bottom: 15px;">
     <a href="missão1.html" style="text-decoration: none; background-color: #343a40; color: #ffffff; padding: 5px 15px; border-radius: 4px; font-size: 12px; border: 1px solid white;">← Voltar para a Missão 1</a> 
    </div>

    <div class="container">
        <!-- Topo da página -->
        <div class="topo" style="display: block; text-align: center;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <div class="logos"><img src="../05. Imagens/logos/logo-escola.jpeg" style="height: 80px;"></div>
                <h1>Parabéns!</h1>
                <div class="logos"><img src="../05. Imagens/logos/logojornada.jpeg" style="height: 80px;"></div>
            </div>
            <!-- Barra de Progresso 100% -->
            <div style="background: #e0e0e0; border-radius: 10px; height: 20px; width: 100%; overflow: hidden;">
                <div style="background: #28a745; height: 100%; width: 100%; text-align: center; color: white; font-size: 14px; font-weight: bold;">100% CONCLUÍDO</div>
            </div>
        </div>

        <!-- Conteúdo do Card -->
        <!-- Conteúdo do Card -->
        <div class="card">
            <!-- Coluna de Texto: flex: 1 faz ela ocupar o espaço disponível -->
            <div style="flex: 1;">
                <p style="font-size: 1.2rem; line-height: 1.6;">Você concluiu a primeira missão e está com a <strong>mochila pronta</strong> para nossa Jornada da Aprendizagem.</p>
                <ul class="checks" style="list-style: none; padding: 0;">
                    <li style="margin-bottom: 10px;"> Guia do Currículo Priorizado</li>
                    <li style="margin-bottom: 10px;"> Materiais digitais e impressos</li>
                    <li style="margin-bottom: 10px;"> Anotações sobre as necessidades de aprendizagem</li>
                </ul>
               <a href="missão2.html" class="botao-missão2" style="display: block; background: #28a745; color: white; padding: 20px; border-radius: 15px; text-align: center; font-weight: bold; text-decoration: none; margin-top: 30px; font-size: 1.2rem;">INICIAR MISSÃO 2 ➔</a> 
            </div>
            
            <!-- Coluna da Mochila: flex: 0 0 300px força o tamanho de 300px -->
            <div style="flex: 0 0 300px; text-align: center;">
                <img src="../05. Imagens/ilustrações/mochila.jpg" alt="Mochila Pronta" style="width: 100%; height: auto;">
            </div>
        </div>
    </div>

</body>
</html>
