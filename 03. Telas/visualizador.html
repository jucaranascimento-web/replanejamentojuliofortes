<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Visualizador de Fichas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f3; padding: 20px; color: #333; }
        .container { background: #ffffff; max-width: 900px; margin: auto; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 15px; margin-bottom: 30px; font-size: 24px; text-transform: uppercase; }
        .campo { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .label { font-weight: 700; color: #2980b9; display: block; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .valor { background: #fcfcfc; padding: 15px; border-radius: 6px; border-left: 5px solid #3498db; white-space: pre-wrap; word-wrap: break-word; line-height: 1.6; font-size: 16px; color: #444; }
        .btn-imprimir { background: #27ae60; color: white; border: none; padding: 12px 30px; cursor: pointer; font-size: 16px; border-radius: 5px; display: block; margin: 30px auto; transition: background 0.3s; }
        .btn-imprimir:hover { background: #219150; }
		.btn-voltar { background: #95a5a6; color: white; border: none; padding: 12px 30px; cursor: pointer; font-size: 16px; border-radius: 5px; display: block; margin: 10px auto; transition: background 0.3s; text-decoration: none; text-align: center; width: fit-content; }
        .btn-voltar:hover { background: #7f8c8d; }
        @media print { .btn-imprimir { display: none; } body { background: white; } .container { box-shadow: none; border: none; } }
    </style>
</head>
<body>
    <div class="container" id="conteudoFicha"><h1>Carregando dados...</h1></div>
    <button class="btn-imprimir" onclick="window.print()">Imprimir Ficha</button>
<a href="consulta.html" class="btn-voltar">Voltar</a>

        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";

        const firebaseConfig = {
        apiKey: "AIzaSyCFDIAUqMAPnoAkzmx-lZFFnIXUVrFNaS0",
        authDomain: "jornada-da-aprendizagem.firebaseapp.com",
        projectId: "jornada-da-aprendizagem",
        storageBucket: "jornada-da-aprendizagem.firebasestorage.app",
        messagingSenderId: "117617967349",
        appId: "1:117617967349:web:d456181a57292a19a485bc"   
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const urlParams = new URLSearchParams(window.location.search);
const fichaId = urlParams.get('id');

                    "esp1": "Descritor/habilidade da Turma não consolidados 1", "esp2": "Descritor/habilidade da Turma~não consolidados 2", "esp3": "Descritor/habilidade da Turma não consolidados 3",

    "conhecimentos_previos": "Conhecimentos Prévios Retomados",

	"inst_portfolio": "Instrumento Portfolio",
	"outros_inst": "Quais outros instrumentos?",
	"retomada": "onhecimentos prévios que necessitam retomada"
                };

                let html = `<h1>${dados.ficha || "Ficha Pedagógica"}</h1>`;

                Object.keys(ordemCampos).forEach(chave => {
                    const valor = dados[chave];
                    if (valor !== undefined && valor !== null && valor !== "" && valor !== false) {
                        const nomeExibicao = ordemCampos[chave];
                      let valorFormatado = (valor === true) ? "Sim" : valor;
                        html += `<div class="campo"><span class="label">${nomeExibicao}:</span><div class="valor">${valorFormatado}</div></div>`;
                    }
                });
document.getElementById("conteudoFicha").innerHTML = html;
    } else {
        document.getElementById("conteudoFicha").innerHTML = "<h1>Ficha não encontrada.</h1>";
    }
}

carregarFicha();
    </script>
</body>
</html>
