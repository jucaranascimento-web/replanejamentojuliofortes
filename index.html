<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jornada da Aprendizagem 2026</title>
    <style>
        /* Fundo azul padrão da sua plataforma */
        body { 
            background: #1E4D8C; 
            color: #333; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        
        /* Caixa branca centralizada */
        .login-box { 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        
        /* Área dos Logotipos */
        .logo-container { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 25px; 
        }
        .logo-container img { 
            height: 70px; 
            object-fit: contain; 
        }
        
        h1 { color: #1E4D8C; margin-bottom: 10px; font-size: 1.6rem; }
        p { margin-bottom: 25px; color: #666; font-size: 0.95rem; }
        
        /* Campos de entrada */
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border: 1px solid #ddd; 
            border-radius: 10px; 
            box-sizing: border-box; 
        }
        
        /* Botão de Entrar */
        .btn-entrar { 
            background: #F28C28; 
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .btn-entrar:hover { background: #df7b1b; }
    </style>
</head>
<body>

<div class="login-box">
    <!-- Logotipos Escola e Jornada -->
    <div class="logo-container">
        <img src="05. Imagens/logos/logo-escola.jpeg" alt="Logo Escola">
        <img src="05. Imagens/logos/logojornada.jpeg" alt="Logo Jornada"> 
    </div>
    
    <h1>Jornada da Aprendizagem</h1>
    <p>Identifique-se para acessar o seu percurso formativo.</p>
    
    <form onsubmit="event.preventDefault(); verificarESalvarLogin();">
        <select name="professor" id="professor" class="seu-estilo-input" required onchange="controlarCampoSenha()" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 10px;">
            <option value="" disabled selected>Selecione seu nome</option>
            <option value="Carol">Carol</option>
            <option value="Dante">Dante</option>
            <option value="Débora">Débora</option>
            <option value="Emerson">Emerson</option>
            <option value="Flávio">Flávio</option>
            <option value="Francisca">Francisca</option>
            <option value="Gleison">Gleison</option>
            <option value="Haron">Haron</option>
            <option value="Jayssa">Jayssa</option>
            <option value="Marisa">Marisa</option>
            <option value="Michelle">Michelle</option>
            <option value="Regiane">Regiane</option>
            <option value="Rejane">Rejane</option>
            <option value="Sabrina">Sabrina</option>
            <option value="Visitante">Acesso Visitante</option>
        </select> 

        <!-- Campo de Senha -->
        <input type="password" id="senha" placeholder="Digite sua senha">

        <button type="submit" class="btn-entrar">ENTRAR</button>
    </form>

    <script>
        // Tabela de Senhas dos Professores
        const senhasProfessores = {
            "Carol": "caroljuliofortes",
            "Dante": "dantejuliofortes",
            "Débora": "deborajuliofortes",
            "Emerson": "emersonjuliofortes",
            "Flávio": "flaviojuliofortes",
            "Francisca": "franciscajuliofortes",
            "Gleison": "gleisonjuliofortes",
            "Haron": "haronjuliofortes",
            "Jayssa": "jayssajuliofortes",
            "Marisa": "marisajuliofortes",
            "Michelle": "michellejuliofortes",
            "Regiane": "regianejuliofortes",
            "Rejane": "rejanejuliofortes",
            "Sabrina": "sabrinajuliofortes"
        };

        // Esconde o campo de senha se escolher Visitante
        function controlarCampoSenha() {
            const nomeProfessor = document.getElementById("professor").value;
            const campoSenha = document.getElementById("senha");

            if (nomeProfessor === "Visitante") {
                campoSenha.style.display = "none";
                campoSenha.required = false;
                campoSenha.value = "";
            } else {
                campoSenha.style.display = "block";
                campoSenha.required = true;
            }
        }

        // Valida a senha antes de redirecionar
        function verificarESalvarLogin() {
            const nomeProfessor = document.getElementById("professor").value;
            const senhaDigitada = document.getElementById("senha").value.trim().toLowerCase();

            if (nomeProfessor === "Visitante" || senhasProfessores[nomeProfessor] === senhaDigitada) {
                localStorage.setItem("nomeProfessor", nomeProfessor);
                window.location.href = "03. Telas/Tela principal da plataforma.html";
            } else {
                alert("❌ Senha incorreta! Tente novamente.");
                document.getElementById("senha").value = "";
            }
        }
    </script>
</div>

</body>
</html>
